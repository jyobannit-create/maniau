name: Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    # 毎週月曜 06:00 JST(日曜 21:00 UTC) — データ更新がなくても残り日数表示を再計算するため
    - cron: "0 21 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate exam data
        run: node scripts/check.mjs
      - name: Build site
        run: node scripts/build.mjs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
